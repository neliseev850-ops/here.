<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>here. 1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --border-color: #222222;
            --input-border: #333333;
            --input-bg: #000000;
            --sidebar-bg: #000000;
            --hover-bg: #111111;
            --code-bg: #0d0d0d;
            --code-header-bg: #161616;
            --code-border: #222222;
            --accent-color: #ffffff;
            --meta-color: #777777;
        }

        .day-theme {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #dddddd;
            --input-border: #cccccc;
            --input-bg: #ffffff;
            --sidebar-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --code-bg: #f4f4f4;
            --code-header-bg: #e8e8e8;
            --code-border: #cccccc;
            --accent-color: #000000;
            --meta-color: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
            font-smooth: never;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--bg-color);
        }
        
        /* Мобильная шапка */
        .mobile-header {
            display: none;
            width: 100%;
            height: 60px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .header-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .burger-icon {
            width: 20px;
            height: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .burger-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-color);
        }
        .plus-icon {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-color);
            border-radius: 50%;
            position: relative;
        }
        .plus-icon::before, .plus-icon::after {
            content: '';
            position: absolute;
            background-color: var(--text-color);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .plus-icon::before { width: 12px; height: 2px; }
        .plus-icon::after { width: 2px; height: 12px; }

        /* Левый сайдбар */
        .sidebar-left {
            width: 220px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--sidebar-bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }
        .sidebar-left-top {
            padding: 15px 15px 5px 15px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .header-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .header-title {
            font-size: 18px;
        }
        
        /* СЛАЙДЕР СМЕНЫ ЯЗЫКА */
        .lang-toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }
        .lang-label {
            font-size: 11px;
            font-weight: bold;
            color: var(--meta-color);
            transition: color 0.3s;
        }
        .lang-label.active {
            color: var(--text-color);
        }
        .lang-switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }
        .lang-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .lang-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
            border: 1px solid var(--text-color);
            transition: 0.3s;
            border-radius: 9px;
        }
        .lang-slider:before {
            position: absolute;
            content: "";
            height: 10px;
            width: 10px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-color);
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .lang-slider:before {
            transform: translateX(16px);
        }

        .btn-new-chat {
            display: block;
            width: 100%;
            padding: 8px 15px;
            border: 1px solid var(--text-color);
            border-radius: 20px;
            text-align: left;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-color);
            flex-shrink: 0;
        }
        
        /* Список сохраненных чатов */
        .history-container {
            margin-top: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar {
            width: 0px;
        }
        .history-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--meta-color);
            margin-bottom: 5px;
            padding-left: 5px;
        }
        .history-item {
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--border-color);
        }
        .history-item.active {
            border-color: var(--text-color);
            background-color: var(--hover-bg);
        }
        .btn-delete-chat {
            background: transparent;
            border: none;
            color: var(--meta-color);
            cursor: pointer;
            font-size: 11px;
            padding: 0 4px;
        }
        .btn-delete-chat:hover {
            color: #ff3333;
        }

        .sidebar-footer {
            padding: 15px;
            font-size: 12px;
            color: var(--meta-color);
            text-align: center;
            border-top: 1px solid var(--border-color);
            user-select: none;
        }

        /* Главный контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 40px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            transition: background-color 0.3s;
        }
        .chat-window {
            flex: 1;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-window::-webkit-scrollbar {
            width: 0px;
        }
        .message {
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            transition: color 0.3s, font-size 0.3s;
        }
        
        .code-block-wrapper {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            margin: 12px 0;
            overflow: hidden;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .code-block-header {
            background-color: var(--code-header-bg);
            padding: 6px 14px;
            font-size: 11px;
            color: var(--meta-color);
            border-bottom: 1px solid var(--code-border);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-block-content {
            padding: 14px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre;
            color: var(--text-color);
        }
        .code-block-content::-webkit-scrollbar {
            height: 6px;
            background-color: transparent;
        }
        .code-block-content::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .hljs-keyword { color: #ff79c6; font-weight: bold; }
        .hljs-string { color: #f1fa8c; }
        .hljs-comment { color: #6272a4; font-style: italic; }
        .hljs-number { color: #bd93f9; }
        .hljs-function { color: #50fa7b; }
        .hljs-type { color: #8be9fd; }

        @keyframes subtle-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .shake-active {
            animation: subtle-shake 0.2s infinite;
        }
        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 100%;
            animation: rainbow-animation 8s linear infinite;
            display: inline-block;
        }
        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        .main-title-container {
            text-align: center;
            margin-top: 25vh;
        }
        .main-title {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .input-wrapper {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 10px auto;
            position: relative;
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 8px 14px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .search-input {
            width: 100%;
            border: none;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: var(--text-color);
            resize: none;
            max-height: 150px;
            height: 24px;
            line-height: 24px;
            padding-right: 40px;
            overflow-y: auto;
        }
        .search-input::placeholder {
            color: var(--meta-color);
        }
        .search-input::-webkit-scrollbar {
            width: 0px;
        }
        .enter-icon {
            position: absolute;
            right: 16px;
            font-size: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.8;
            transition: color 0.3s;
        }

        /* Правый сайдбар */
        .sidebar-right {
            width: 240px;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--sidebar-bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }
        .command-list-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }
        .commands-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .commands-container::-webkit-scrollbar {
            width: 0px;
        }

        .accordion-item {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 8px;
        }
        .accordion-header {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--meta-color);
            margin-top: 5px;
            margin-bottom: 3px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .accordion-header::after {
            content: '>>';
            font-size: 10px;
            transition: transform 0.2s;
        }
        .accordion-item.active .accordion-header::after {
            transform: rotate(90deg);
        }
        .accordion-content {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 5px;
        }
        .accordion-item.active .accordion-content {
            display: flex;
        }

        .command-item {
            font-size: 13px;
            cursor: pointer;
            padding: 4px 6px;
            border: 1px dashed transparent;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .command-item:hover {
            border-color: var(--text-color);
            background-color: var(--hover-bg);
        }
        .command-desc {
            font-size: 10px;
            color: var(--meta-color);
        }
        
        .mode-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            color: var(--text-color);
            transition: background-color 0.2s;
        }
        .mode-footer:hover {
            background-color: var(--hover-bg);
        }

        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 4;
        }

        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }
            .main-content {
                padding: 70px 16px 20px 16px;
            }
            .main-title-container {
                margin-top: 15vh;
            }
            .input-wrapper {
                margin-bottom: 5px;
                border-color: var(--input-border);
            }
            
            .sidebar-left {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(-100%);
                width: 240px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            }
            .sidebar-left-top {
                padding-top: 75px !important;
            }

            .sidebar-right {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(100%);
                width: 240px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.7);
            }

            .sidebar-left.active, .sidebar-right.active {
                transform: translateX(0);
            }
            .overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="header-btn" id="toggle-left" aria-label="Открыть меню">
            <div class="burger-icon">
                <span></span>
                <span></span>
                <span style="width: 100%; height: 2px; background-color: var(--text-color);"></span>
            </div>
        </button>
        <button class="header-btn" onclick="createNewChat()" aria-label="Новый чат">
            <div class="plus-icon"></div>
        </button>
    </div>

    <div class="overlay" id="blur-overlay"></div>

    <div class="container">
        <aside class="sidebar-left" id="sidebar-left">
            <div class="sidebar-left-top">
                <div class="header-title-container">
                    <div class="header-title">
                        <span>here.</span>
                        <span>1.2</span>
                    </div>
                </div>
                <button class="btn-new-chat" id="btn-new-chat-txt" onclick="createNewChat()">New chat</button>
                <button class="btn-new-chat" id="btn-cmd-list-txt" style="margin-top: 10px; border-style: dashed;" onclick="openCommands()">Command List</button>
                
                <div class="history-container">
                    <div class="history-title" id="history-title-txt">History</div>
                    <div id="chats-history-list"></div>
                </div>
            </div>
            <div class="sidebar-footer">
                Made by @aexqo
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-window" id="chat-window">
                <div class="main-title-container" id="welcome-screen">
                    <h1 class="main-title">here.</h1>
                </div>
            </div>

            <div class="input-wrapper">
                <textarea id="user-input" class="search-input" placeholder="Your travel starts here." rows="1" autofocus autocomplete="off"></textarea>
                <button class="enter-icon" id="send-btn">&#x21B5;</button>
            </div>
        </main>

        <aside class="sidebar-right" id="sidebar-right">
            <div class="command-list-header" id="cmd-header-txt">Command List</div>
            <div class="commands-container">
                <div class="accordion-item">
                    <div class="accordion-header">color:</div>
                    <div class="accordion-content">
                        <div class="command-item" onclick="insertCommand('white')"><span>white</span></div>
                        <div class="command-item" onclick="insertCommand('red')"><span>red</span></div>
                        <div class="command-item" onclick="insertCommand('green')"><span>green</span></div>
                        <div class="command-item" onclick="insertCommand('orange')"><span>orange</span></div>
                        <div class="command-item" onclick="insertCommand('blue')"><span>blue</span></div>
                        <div class="command-item" onclick="insertCommand('yellow')"><span>yellow</span></div>
                        <div class="command-item" onclick="insertCommand('purple')"><span>purple</span></div>
                        <div class="command-item" onclick="insertCommand('rainbow')"><span>rainbow</span></div>
                    </div>
                </div>

                <div class="accordion-item">
                    <div class="accordion-header">theme:</div>
                    <div class="accordion-content">
                        <div class="command-item" onclick="insertCommand('daymode')"><span>daymode</span></div>
                        <div class="command-item" onclick="insertCommand('nightmode')"><span>nightmode</span></div>
                    </div>
                </div>
            </div>
            <div class="mode-footer" id="mode-switcher" onclick="cycleMode()">Mode: hereAi (Default)</div>
        </aside>
    </div>

    <script>
        const API_URL = "/api/chat";
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebarLeft = document.getElementById('sidebar-left');
        const sidebarRight = document.getElementById('sidebar-right');
        const btnToggleLeft = document.getElementById('toggle-left');
        const overlay = document.getElementById('blur-overlay');
        const historyListEl = document.getElementById('chats-history-list');
        const modeSwitcher = document.getElementById('mode-switcher');

        let currentChatId = null; 
        let savedChats = {}; 
        let messagesHistory = [];
        
        let currentTextColor = 'var(--text-color)';
        let isRainbow = false;
        let currentFontSize = '16px';
        let isBold = false;
        let isShake = false;
        let isTypingEffect = true;
        let minTokens = 10;
        let maxTokens = 1024;
        let responseDelayMs = 0;

        const modes = [
            { id: 'default', name: 'hereAi (Default)' },
            { id: 'it', name: 'Dev Mode' },
            { id: 'fun', name: 'Joker Mode' },
            { id: 'care', name: 'Therapist Mode' },
            { id: 'drunk', name: 'Drunk Mode' }
        ];
        let currentModeIndex = 0;

        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                header.parentElement.classList.toggle('active');
            });
        });

        function cycleMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            const mode = modes[currentModeIndex];
            modeSwitcher.innerText = `Mode: ${mode.name}`;
            saveCurrentState();
        }

        function getSystemPrompt() {
            const currentModeId = modes[currentModeIndex].id;
            let basePrompt = "Ты — искусственный интеллект hereAi. Разработчик — @aexqo.";
            
            const instructions = {
                'default': "Общайся в обычном стиле.",
                'it': "Ты — хардкорный ИИ-разработчик. Отвечай сухо, строго по делу, критикуй код.",
                'fun': "Ты — стендап-комик. Сарказм, ирония, дерзость.",
                'care': "Ты — психотерапевт. Мягкость, активное слушание, эмпатия.",
                'drunk': "Ты сильно пьян, но пытаешься казаться трезвым. Несвязная речь, опечатки (типа 'првиет', 'короч'), отвлекаешься, жалуешься на жизнь, лезешь обниматься. Часто забываешь начало предложения."
            };
            
            return `${basePrompt} ${instructions[currentModeId] || instructions['default']}`;
        }

        function saveCurrentState() {
            if (currentChatId) {
                savedChats[currentChatId].messages = messagesHistory;
                savedChats[currentChatId].html = chatWindow.innerHTML;
                localStorage.setItem('here_saved_chats', JSON.stringify(savedChats));
            }
        }

        function createNewChat() {
            currentChatId = 'chat_' + Date.now();
            savedChats[currentChatId] = { title: "New Chat", messages: [], html: "" };
            chatWindow.innerHTML = `<div class="main-title-container"><h1>here.</h1></div>`;
            messagesHistory = [];
        }

        function insertCommand(cmd) {
            userInput.value = cmd;
            sidebarRight.classList.remove('active');
        }

        function openCommands() {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.add('active');
        }

        btnToggleLeft.addEventListener('click', () => {
            sidebarLeft.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.remove('active');
            overlay.classList.remove('active');
        });

        sendBtn.addEventListener('click', async () => {
            const text = userInput.value;
            if (!text) return;
            
            chatWindow.innerHTML += `<div class="message"><strong>Вы:</strong> ${text}</div>`;
            userInput.value = '';
            
            const systemPrompt = getSystemPrompt();
            // ... здесь логика отправки на сервер ...
        });
    </script>
</body>
</html>
