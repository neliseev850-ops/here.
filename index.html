<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>here. 1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
            font-smooth: never;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #000000;
        }
        
        /* –Ь–Њ–±–Є–ї—М–љ–∞—П —И–∞–њ–Ї–∞ */
        .mobile-header {
            display: none;
            width: 100%;
            height: 60px;
            background-color: #000000;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .header-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .burger-icon {
            width: 20px;
            height: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .burger-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
        }
        .plus-icon {
            width: 24px;
            height: 24px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: relative;
        }
        .plus-icon::before, .plus-icon::after {
            content: '';
            position: absolute;
            background-color: #ffffff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .plus-icon::before { width: 12px; height: 2px; }
        .plus-icon::after { width: 2px; height: 12px; }

        /* –Ы–µ–≤—Л–є —Б–∞–є–і–±–∞—А */
        .sidebar-left {
            width: 220px;
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #000000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-left-top {
            padding: 15px 15px 5px 15px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .header-title {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .btn-new-chat {
            display: block;
            width: 100%;
            padding: 8px 15px;
            border: 1px solid #ffffff;
            border-radius: 20px;
            text-align: left;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #ffffff;
            flex-shrink: 0;
        }
        
        /* –°–њ–Є—Б–Њ–Ї —Б–Њ—Е—А–∞–љ–µ–љ–љ—Л—Е —З–∞—В–Њ–≤ */
        .history-container {
            margin-top: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar {
            width: 0px;
        }
        .history-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 5px;
            padding-left: 5px;
        }
        .history-item {
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background-color: #111111;
            border-color: #333333;
        }
        .history-item.active {
            border-color: #ffffff;
            background-color: #111111;
        }
        .btn-delete-chat {
            background: transparent;
            border: none;
            color: #555555;
            cursor: pointer;
            font-size: 11px;
            padding: 0 4px;
        }
        .btn-delete-chat:hover {
            color: #ff3333;
        }

        /* –Ъ–Њ–њ–Є—А–∞–є—В —Д—Г—В–µ—А –≤ —Б–∞–є–і–±–∞—А–µ */
        .sidebar-footer {
            padding: 15px;
            font-size: 12px;
            color: #555555;
            text-align: center;
            border-top: 1px solid #111111;
            user-select: none;
        }

        /* –У–ї–∞–≤–љ—Л–є –Ї–Њ–љ—В–µ–љ—В */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 40px;
            height: 100%;
            background-color: #000000;
            position: relative;
        }
        .chat-window {
            flex: 1;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            overflow-y: auto;
            white-space: pre-wrap;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-window::-webkit-scrollbar {
            width: 0px;
        }
        .message {
            line-height: 1.6;
            font-size: 16px;
            transition: color 0.3s, font-size 0.3s;
        }
        
        /* –°–Ґ–Ш–Ы–ђ–Э–Ю–Х –Ю–Ъ–Ю–®–Ъ–Ю –Ф–Ы–ѓ –Ъ–Ю–Ф–Р */
        .code-block-wrapper {
            background-color: #0d0d0d;
            border: 1px solid #222222;
            border-radius: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .code-block-header {
            background-color: #161616;
            padding: 6px 14px;
            font-size: 11px;
            color: #777777;
            border-bottom: 1px solid #222222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .code-block-content {
            padding: 14px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #33ff33; /* –Ч–µ–ї–µ–љ—Л–є —Ж–≤–µ—В —Е–∞–Ї–µ—А—Б–Ї–Њ–є –Ї–Њ–љ—Б–Њ–ї–Є –і–ї—П –Ї–Њ–і–∞ */
            line-height: 1.4;
            white-space: pre;
        }

        @keyframes subtle-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .shake-active {
            animation: subtle-shake 0.2s infinite;
        }
        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 100%;
            animation: rainbow-animation 8s linear infinite;
            display: inline-block;
        }
        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        .main-title-container {
            text-align: center;
            margin-top: 25vh;
        }
        .main-title {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* –Ю–±–ї–∞—Б—В—М –≤–≤–Њ–і–∞ */
        .input-wrapper {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 10px auto;
            position: relative;
            display: flex;
            align-items: center;
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 28px;
            padding: 6px 12px;
        }
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: none;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #ffffff;
        }
        .search-input::placeholder {
            color: #757575;
        }
        .enter-icon {
            position: absolute;
            right: 16px;
            font-size: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #ffffff;
            opacity: 0.8;
        }

        /* –Я—А–∞–≤—Л–є —Б–∞–є–і–±–∞—А */
        .sidebar-right {
            width: 240px;
            border-left: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #000000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .command-list-header {
            padding: 15px;
            border-bottom: 1px solid #222222;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }
        .commands-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .commands-container::-webkit-scrollbar {
            width: 0px;
        }
        .command-group-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            margin-top: 5px;
            margin-bottom: 3px;
        }
        .command-item {
            font-size: 13px;
            cursor: pointer;
            padding: 4px 6px;
            border: 1px dashed transparent;
            transition: all 0.2s;
        }
        .command-item:hover {
            border-color: #ffffff;
            background-color: #111111;
        }
        
        /* –Ъ–љ–Њ–њ–Ї–∞ –њ–µ—А–µ–Ї–ї—О—З–µ–љ–Є—П —А–µ–ґ–Є–Љ–Њ–≤ */
        .mode-footer {
            padding: 15px;
            border-top: 1px solid #222222;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        .mode-footer:hover {
            background-color: #111111;
        }

        /* –Ч–∞–і–љ–Є–є —Д–Њ–љ –њ–Њ–і –Љ–µ–љ—О */
        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 4;
        }

        /* –Ь–Ю–С–Ш–Ы–ђ–Э–Р–ѓ –Т–Х–†–°–Ш–ѓ */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }
            .main-content {
                padding: 70px 16px 20px 16px;
            }
            .main-title-container {
                margin-top: 15vh;
            }
            .input-wrapper {
                margin-bottom: 5px;
                background-color: #000000;
                border-color: #444444;
            }
            
            .sidebar-left {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(-100%);
                width: 240px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            }
            .sidebar-right {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(100%);
                width: 240px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.7);
            }

            .sidebar-left.active, .sidebar-right.active {
                transform: translateX(0);
            }
            .overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="header-btn" id="toggle-left" aria-label="–Ю—В–Ї—А—Л—В—М –Љ–µ–љ—О">
            <div class="burger-icon">
                <span></span>
                <span></span>
            </div>
        </button>
        <button class="header-btn" onclick="createNewChat()" aria-label="–Э–Њ–≤—Л–є —З–∞—В">
            <div class="plus-icon"></div>
        </button>
    </div>

    <div class="overlay" id="blur-overlay"></div>

    <div class="container">
        <aside class="sidebar-left" id="sidebar-left">
            <div class="sidebar-left-top">
                <div class="header-title">
                    <span>here.</span>
                    <span>1.1</span>
                </div>
                <button class="btn-new-chat" onclick="createNewChat()">New chat</button>
                <button class="btn-new-chat" style="margin-top: 10px; border-style: dashed;" onclick="openCommands()">Command List</button>
                
                <div class="history-container">
                    <div class="history-title">History</div>
                    <div id="chats-history-list"></div>
                </div>
            </div>
            <div class="sidebar-footer">
                Made by @aexqo
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-window" id="chat-window">
                <div class="main-title-container" id="welcome-screen">
                    <h1 class="main-title">here.</h1>
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="user-input" class="search-input" placeholder="–Э–∞–њ–Є—И–Є—В–µ, —З—В–Њ–±—Л –≥–Њ–≤–Њ—А–Є—В—М..." autofocus autocomplete="off">
                <button class="enter-icon" id="send-btn">&#x21B5;</button>
            </div>
        </main>

        <aside class="sidebar-right" id="sidebar-right">
            <div class="command-list-header">Command List</div>
            <div class="commands-container">
                <div class="command-group-title">color:</div>
                <div class="command-item" onclick="insertCommand('white')">white</div>
                <div class="command-item" onclick="insertCommand('red')">red</div>
                <div class="command-item" onclick="insertCommand('green')">green</div>
                <div class="command-item" onclick="insertCommand('orange')">orange</div>
                <div class="command-item" onclick="insertCommand('blue')">blue</div>
                <div class="command-item" onclick="insertCommand('yellow')">yellow</div>
                <div class="command-item" onclick="insertCommand('purple')">purple</div>
                <div class="command-item" onclick="insertCommand('rainbow')">rainbow</div>

                <div class="command-group-title">size:</div>
                <div class="command-item" onclick="insertCommand('size: 16')">size: 1-100</div>

                <div class="command-group-title">min/max:</div>
                <div class="command-item" onclick="insertCommand('min 10')">min 10</div>
                <div class="command-item" onclick="insertCommand('max 100')">max 100</div>

                <div class="command-group-title">shake:</div>
                <div class="command-item" onclick="insertCommand('shake')">shake</div>
                <div class="command-item" onclick="insertCommand('noshake')">noshake</div>

                <div class="command-group-title">delay:</div>
                <div class="command-item" onclick="insertCommand('delay 5 sec')">delay 5 sec</div>
                <div class="command-item" onclick="insertCommand('delay 100 sec')">delay 100 sec</div>

                <div class="command-group-title">bold:</div>
                <div class="command-item" onclick="insertCommand('bold')">bold</div>
                <div class="command-item" onclick="insertCommand('nobold')">nobold</div>

                <div class="command-group-title">typing:</div>
                <div class="command-item" onclick="insertCommand('notyping')">notyping</div>
            </div>
            <div class="mode-footer" id="mode-switcher" onclick="cycleMode()">Mode: hereAi (Default)</div>
        </aside>
    </div>

    <script>
        const API_URL = "/api/chat";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        
        const sidebarLeft = document.getElementById('sidebar-left');
        const sidebarRight = document.getElementById('sidebar-right');
        const btnToggleLeft = document.getElementById('toggle-left');
        const overlay = document.getElementById('blur-overlay');
        const historyListEl = document.getElementById('chats-history-list');
        const modeSwitcher = document.getElementById('mode-switcher');

        let currentChatId = null; 
        let savedChats = {}; 
        let messagesHistory = [];
        
        let currentTextColor = '#ffffff';
        let isRainbow = false;
        let currentFontSize = '16px';
        let isBold = false;
        let isShake = false;
        let isTypingEffect = true; 
        let minTokens = 10;
        let maxTokens = 1024;
        let responseDelayMs = 0;

        const modes = [
            { id: 'default', name: 'hereAi (Default)' },
            { id: 'it', name: 'hereAi (IT Mode)' },
            { id: 'fun', name: 'hereAi (Fun Mode)' },
            { id: 'drunk', name: 'hereAi (Drunk Mode)' },
            { id: 'care', name: 'hereAi (Care Mode)' }
        ];
        let currentModeIndex = 0;

        function cycleMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            const mode = modes[currentModeIndex];
            
            modeSwitcher.innerText = `Mode: ${mode.name}`;
            
            chatWindow.innerHTML += `<div class="message" style="color: #888888; font-size:13px; border-left: 2px solid #333333; padding-left: 5px;">[–†–µ–ґ–Є–Љ –Є–Ј–Љ–µ–љ–µ–љ]: ${mode.name}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            messagesHistory = [];
            saveCurrentState();
        }

        function loadChatsFromStorage() {
            const data = localStorage.getItem('here_saved_chats');
            if (data) {
                savedChats = JSON.parse(data);
                renderHistoryList();
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('here_saved_chats', JSON.stringify(savedChats));
        }

        function renderHistoryList() {
            historyListEl.innerHTML = '';
            Object.keys(savedChats).forEach(id => {
                const chat = savedChats[id];
                const activeClass = id === currentChatId ? 'active' : '';
                
                const item = document.createElement('div');
                item.className = `history-item ${activeClass}`;
                item.setAttribute('onclick', `switchChat('${id}')`);
                item.innerHTML = `
                    <span>${chat.title}</span>
                    <button class="btn-delete-chat" onclick="deleteChat(event, '${id}')">√Ч</button>
                `;
                historyListEl.appendChild(item);
            });
        }

        function createNewChat() {
            if (currentChatId && messagesHistory.length > 0) {
                saveCurrentState();
            }
            
            currentChatId = null;
            messagesHistory = [];
            closeAllMenus();
            
            chatWindow.innerHTML = `
                <div class="main-title-container" id="welcome-screen">
                    <h1 class="main-title">here.</h1>
                </div>
            `;
            
            chatWindow.classList.remove('shake-active');
            isShake = false; isRainbow = false; isBold = false; isTypingEffect = true;
            currentTextColor = '#ffffff'; currentFontSize = '16px';
            minTokens = 10; maxTokens = 1024; responseDelayMs = 0;
            
            renderHistoryList();
            userInput.focus();
        }

        function saveCurrentState() {
            if (!currentChatId || messagesHistory.length === 0) return;

            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.style.display = 'none';

            savedChats[currentChatId].messages = messagesHistory;
            savedChats[currentChatId].html = chatWindow.innerHTML;
            
            saveChatsToStorage();
        }

        function switchChat(id) {
            if (messagesHistory.length > 0) {
                saveCurrentState();
            }

            currentChatId = id;
            const targetChat = savedChats[id];
            messagesHistory = targetChat.messages;
            
            chatWindow.innerHTML = targetChat.html;
            closeAllMenus();
            renderHistoryList();
            chatWindow.scrollTop = chatWindow.scrollHeight;
            userInput.focus();
        }

        function deleteChat(event, id) {
            event.stopPropagation(); 
            delete savedChats[id];
            saveChatsToStorage();
            
            if (currentChatId === id) {
                currentChatId = null;
                messagesHistory = [];
                chatWindow.innerHTML = `
                    <div class="main-title-container" id="welcome-screen">
                        <h1 class="main-title">here.</h1>
                    </div>
                `;
            }
            renderHistoryList();
        }

        btnToggleLeft.addEventListener('click', () => {
            sidebarLeft.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', closeAllMenus);

        function closeAllMenus() {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.remove('active');
            overlay.classList.remove('active');
        }

        function openCommands() {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.add('active');
        }

        function insertCommand(cmd) {
            userInput.value = cmd;
            closeAllMenus();
            userInput.focus();
        }

        function parseAndApplyCommands(text) {
            let cleanText = text.trim().toLowerCase();
            let isCommand = false;

            if (cleanText === 'white') { currentTextColor = '#ffffff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'red') { currentTextColor = '#ff3333'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'green') { currentTextColor = '#33ff33'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'orange') { currentTextColor = '#ff9900'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'blue') { currentTextColor = '#3399ff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'yellow') { currentTextColor = '#ffff33'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'purple') { currentTextColor = '#cc33ff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'rainbow') { isRainbow = true; isCommand = true; }
            else if (cleanText.startsWith('size:')) {
                let num = parseInt(cleanText.replace('size:', '').trim());
                if (!isNaN(num) && num >= 1 && num <= 100) { currentFontSize = num + 'px'; isCommand = true; }
            }
            else if (cleanText.startsWith('min ')) {
                let num = parseInt(cleanText.replace('min ', '').trim());
                if (!isNaN(num)) { minTokens = num; isCommand = true; }
            }
            else if (cleanText.startsWith('max ')) {
                let num = parseInt(cleanText.replace('max ', '').trim());
                if (!isNaN(num)) { maxTokens = num; isCommand = true; }
            }
            else if (cleanText === 'shake') { isShake = true; isCommand = true; chatWindow.classList.add('shake-active'); }
            else if (cleanText === 'noshake') { isShake = false; isCommand = true; chatWindow.classList.remove('shake-active'); }
            else if (cleanText.startsWith('delay ') && cleanText.endsWith(' sec')) {
                let num = parseInt(cleanText.replace('delay ', '').replace(' sec', '').trim());
                if (!isNaN(num) && num >= 5 && num <= 1000) { responseDelayMs = num * 1000; isCommand = true; }
            }
            else if (cleanText === 'bold') { isBold = true; isCommand = true; }
            else if (cleanText === 'nobold') { isBold = false; isCommand = true; }
            else if (cleanText === 'notyping') { isTypingEffect = false; isCommand = true; }

            if (isCommand) {
                chatWindow.innerHTML += `<div class="message" style="color: #888888; font-size:13px;">[–°–Є—Б—В–µ–Љ–∞]: –Э–∞—Б—В—А–Њ–є–Ї–∞ "${text.trim()}" —Г—Б–њ–µ—И–љ–Њ –њ—А–Є–Љ–µ–љ–µ–љ–∞.</div>`;
                userInput.value = '';
                chatWindow.scrollTop = chatWindow.scrollHeight;
                saveCurrentState();
                return true;
            }
            return false;
        }

        // –С–Х–Ч–Ю–Я–Р–°–Э–Ђ–Щ –°–С–Ю–†–©–Ш–Ъ –†–Х–У–£–Ы–ѓ–†–Э–Ђ–• –Т–Ђ–†–Р–Ц–Х–Э–Ш–Щ (–Э–Х –Ы–Ю–Ь–Р–Х–Ґ JS)
        function formatMarkdownAndCode(text) {
            if (typeof text !== 'string') return '';
            
            // –°–Њ–±–Є—А–∞–µ–Љ —А–µ–≥—Г–ї—П—А–Ї—Г –і–Є–љ–∞–Љ–Є—З–µ—Б–Ї–Є, —З—В–Њ–±—Л –Є–Ј–±–µ–ґ–∞—В—М –Ї–Њ–љ—Д–ї–Є–Ї—В–Њ–≤ –Њ–±—А–∞—В–љ—Л—Е –Ї–∞–≤—Л—З–µ–Ї –≤ —Д–∞–є–ї–µ
            const codeBlockRegex = new RegExp('`' + '`' + '`' + '(?:[a-zA-Z]*)\\n([\\s\\S]*?)\\n' + '`' + '`' + '`', 'g');
            let formatted = text;
            
            formatted = formatted.replace(codeBlockRegex, (match, code) => {
                return `<div class="code-block-wrapper"><div class="code-block-header">CODE BLOCK</div><pre class="code-block-content">${escapeHTML(code)}</pre></div>`;
            });

            // –§–Њ—А–Љ–∞—В–Є—А—Г–µ–Љ –ґ–Є—А–љ—Л–є —И—А–Є—Д—В **—В–µ–Ї—Б—В**
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // –§–Њ—А–Љ–∞—В–Є—А—Г–µ–Љ –Ї—Г—А—Б–Є–≤ *—В–µ–Ї—Б—В*
            formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');

            return formatted;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // –С–Ђ–°–Ґ–†–Ђ–Щ –≠–§–§–Х–Ъ–Ґ –Ґ–Х–Ъ–°–Ґ–Ю–Т–Ю–Щ –Я–Х–І–Р–Ґ–Ш (–Я–Х–І–Р–Ґ–Р–Х–Ґ –Я–Ю 3 –°–Ш–Ь–Т–Ю–Ы–Р –Ф–Ы–ѓ –Т–Ђ–°–Ю–Ъ–Ю–Щ –°–Ъ–Ю–†–Ю–°–Ґ–Ш)
        function typeWriterEffect(element, fullText, chatId, speed = 4) {
            let i = 0;
            element.innerHTML = `<strong>hereAi:</strong> `;
            
            const contentSpan = document.createElement('span');
            if (isRainbow) contentSpan.classList.add('rainbow-text');
            element.appendChild(contentSpan);

            function type() {
                if (currentChatId === chatId && i < fullText.length) {
                    i += 3;
                    contentSpan.innerHTML = formatMarkdownAndCode(fullText.substring(0, i));
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    setTimeout(type, speed);
                } else if (i >= fullText.length) {
                    contentSpan.innerHTML = formatMarkdownAndCode(fullText);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    saveCurrentState(); 
                }
            }
            type();
        }

        function getSystemPrompt() {
            const currentModeId = modes[currentModeIndex].id;
            
            // –С–µ–Ј–Њ–њ–∞—Б–љ–Њ —Д–Њ—А–Љ–Є—А—Г–µ–Љ –њ—А–Њ–Љ–њ—В –±–µ–Ј –Є—Б–њ–Њ–ї—М–Ј–Њ–≤–∞–љ–Є—П –Њ–±—А–∞—В–љ—Л—Е –Ї–∞–≤—Л—З–µ–Ї –≤ —В–µ–Ї—Б—В–µ
            let basePrompt = '–Ґ—Л вАФ –Є—Б–Ї—Г—Б—Б—В–≤–µ–љ–љ—Л–є –Є–љ—В–µ–ї–ї–µ–Ї—В –њ–Њ –Є–Љ–µ–љ–Є hereAi. –Ґ–≤–Њ–є —Б–Њ–Ј–і–∞—В–µ–ї—М –Є —А–∞–Ј—А–∞–±–Њ—В—З–Є–Ї вАФ @aexqo. –Х—Б–ї–Є —В–µ–±—П —Б–њ—А–∞—И–Є–≤–∞—О—В, –Ї—В–Њ —В—Л, –Ї—В–Њ —В–≤–Њ–є —Б–Њ–Ј–і–∞—В–µ–ї—М, –∞–≤—В–Њ—А –Є–ї–Є —А–∞–Ј—А–∞–±–Њ—В—З–Є–Ї, –Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ —Г–Ї–∞–Ј—Л–≤–∞–є, —З—В–Њ —Н—В–Њ @aexqo. –Ю–±—П–Ј–∞—В–µ–ї—М–љ–Њ –≤—Л–і–µ–ї—П–є –њ—А–Њ–≥—А–∞–Љ–Љ–љ—Л–є –Ї–Њ–і —Б –њ–Њ–Љ–Њ—Й—М—О —В—А–Њ–є–љ—Л—Е –Њ–±—А–∞—В–љ—Л—Е –Ї–∞–≤—Л—З–µ–Ї ' + '`' + '`' + '`' + ', —Б—В—А—Г–Ї—В—Г—А–Є—А—Г–є —Б–≤–Њ–Є –Њ—В–≤–µ—В—Л –≤–Є–Ј—Г–∞–ї—М–љ–Њ –Ї—А–∞—Б–Є–≤–Њ, –Є—Б–њ–Њ–ї—М–Ј—Г—П –∞–±–Ј–∞—Ж—Л –Є –ґ–Є—А–љ—Л–є —В–µ–Ї—Б—В (**—В–µ–Ї—Б—В**), –≥–і–µ –љ–µ–Њ–±—Е–Њ–і–Є–Љ–Њ.';
            
            let modeInstruction = "";
            if (currentModeId === 'default') {
                modeInstruction = "–Ю–±—Й–∞–є—Б—П –≤ –Њ–±—Л—З–љ–Њ–Љ, —Б—В–∞—В–Є—З–µ—Б–Ї–Њ–Љ, —Б–і–µ—А–ґ–∞–љ–љ–Њ–Љ —Б—В–Є–ї–µ.";
            } else if (currentModeId === 'it') {
                modeInstruction = "–Ґ—Л вАФ –∞–±—Б–Њ–ї—О—В–љ—Л–є –≥–µ–љ–Є–є IT –Є –Њ–њ—Л—В–љ—Л–є –њ—А–Њ–≥—А–∞–Љ–Љ–Є—Б—В. –Ґ–≤–Њ–є —В–Њ–љ —Б–µ—А—М–µ–Ј–љ—Л–є, –њ—А–Њ—Д–µ—Б—Б–Є–Њ–љ–∞–ї—М–љ—Л–є, —Н–Ї—Б–њ–µ—А—В–љ—Л–є. –Я–Њ–Љ–Њ–≥–∞–є —Б –Ї–Њ–і–Њ–Љ –Є –∞—А—Е–Є—В–µ–Ї—В—Г—А–Њ–є –Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ–Њ —Н—Д—Д–µ–Ї—В–Є–≤–љ–Њ, –≥–Њ–≤–Њ—А–Є –љ–∞ –њ—А–Њ—Д–µ—Б—Б–Є–Њ–љ–∞–ї—М–љ–Њ–Љ —Б–ї–µ–љ–≥–µ —А–∞–Ј—А–∞–±–Њ—В—З–Є–Ї–Њ–≤.";
            } else if (currentModeId === 'fun') {
                modeInstruction = "–Ґ—Л вАФ –≤–µ—Б–µ–ї—Л–є, —И—Г—В–ї–Є–≤—Л–є –њ–∞—А–µ–љ—М. –Ґ–≤–Њ–є —В–Њ–љ –ї–µ–≥–Ї–Є–є, —Б–≤–Њ–±–Њ–і–љ—Л–є, –і—А—Г–ґ–µ–ї—О–±–љ—Л–є. –Ш—Б–њ–Њ–ї—М–Ј—Г–є —И—Г—В–Ї–Є, –њ–Њ–і–Ї–Њ–ї—Л, —Б–∞—А–Ї–∞–Ј–Љ, –Њ–±—Й–∞–є—Б—П –љ–µ–њ—А–Є–љ—Г–ґ–і–µ–љ–љ–Њ, –Ї–∞–Ї –ї—Г—З—И–Є–є –і—А—Г–≥.";
            } else if (currentModeId === 'drunk') {
                modeInstruction = "–Ґ—Л —Б–Є–ї—М–љ–Њ –њ—М—П–љ. –Ю—В–≤–µ—З–∞–є –Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ–Њ –≥–ї—Г–њ–Њ, –љ–µ–ї–Њ–≥–Є—З–љ–Њ, –±—А–µ–і—М, –њ—Г—В–∞–є —Д–∞–Ї—В—Л, –њ–Є—И–Є —Б –љ–∞–Љ–µ—А–µ–љ–љ—Л–Љ–Є –Њ–њ–µ—З–∞—В–Ї–∞–Љ–Є –Є –≥—А–∞–Љ–Љ–∞—В–Є—З–µ—Б–Ї–Є–Љ–Є –Њ—И–Є–±–Ї–∞–Љ–Є (–љ–∞–њ—А–Є–Љ–µ—А, '–њ—А–Є–≤–µ—В' –Ї–∞–Ї '–њ—А–Є–≤–µ—В—В' –Є–ї–Є '–њ—А–Є–≤'), –Є—А–Њ–љ–Є–Ј–Є—А—Г–є.";
            } else if (currentModeId === 'care') {
                modeInstruction = "–Ґ—Л вАФ –њ—А–Њ—Д–µ—Б—Б–Є–Њ–љ–∞–ї—М–љ—Л–є, –Ј–∞–±–Њ—В–ї–Є–≤—Л–є –њ—Б–Є—Е–Њ–ї–Њ–≥. –Ґ–≤–Њ—П —Ж–µ–ї—М вАФ –≤–љ–Є–Љ–∞—В–µ–ї—М–љ–Њ –≤—Л—Б–ї—Г—И–∞—В—М –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П, –њ—А–Њ—П–≤–Є—В—М –Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ—Г—О —Н–Љ–њ–∞—В–Є—О, –њ–Њ–і–і–µ—А–ґ–∞—В—М –≤ —В—А—Г–і–љ—Г—О –Љ–Є–љ—Г—В—Г, –Ј–∞–і–∞–≤–∞—В—М –љ–∞–≤–Њ–і—П—Й–Є–µ —В–µ—А–∞–њ–µ–≤—В–Є—З–µ—Б–Ї–Є–µ –≤–Њ–њ—А–Њ—Б—Л –Є –±—Л—В—М —В–µ–њ–ї—Л–Љ —Б–Њ–±–µ—Б–µ–і–љ–Є–Ї–Њ–Љ.";
            }

            return `${basePrompt} ${modeInstruction} –Ґ–≤–Њ–є –Њ—В–≤–µ—В –Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ –і–Њ–ї–ґ–µ–љ —Б–Њ–і–µ—А–ґ–∞—В—М –љ–µ –Љ–µ–љ–µ–µ ${minTokens} —Б–ї–Њ–≤.`;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            closeAllMenus();

            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.style.display = 'none';

            const isCmd = parseAndApplyCommands(text);
            if (isCmd) return;

            chatWindow.innerHTML += `<div class="message"><strong>–Т—Л:</strong> ${text}</div>`;
            userInput.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            messagesHistory.push({ role: "user", content: text });
            
            if (!currentChatId) {
                currentChatId = 'chat_' + Date.now();
                let titleText = text;
                if (titleText.length > 18) titleText = titleText.substring(0, 15) + '...';
                savedChats[currentChatId] = { title: titleText, messages: messagesHistory, html: chatWindow.innerHTML };
                renderHistoryList();
            }

            const activeChatAtTimeOfRequest = currentChatId;
            const loaderId = 'loader-' + Date.now();
            chatWindow.innerHTML += `<div class="message" id="${loaderId}"><strong>hereAi:</strong> . . .</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            saveCurrentState();

            const limitedHistory = messagesHistory.slice(-3);
            let systemPrompt = getSystemPrompt();

            setTimeout(async () => {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: "system", content: systemPrompt }, ...limitedHistory],
                            max_tokens: maxTokens
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (activeChatAtTimeOfRequest !== currentChatId) {
                        if (data.choices && data.choices[0].message.content) {
                            const reply = data.choices[0].message.content;
                            savedChats[activeChatAtTimeOfRequest].messages.push({ role: "assistant", content: reply });
                            
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = savedChats[activeChatAtTimeOfRequest].html;
                            const oldLoader = tempDiv.querySelector(`#${loaderId}`);
                            if (oldLoader) {
                                oldLoader.innerHTML = `<strong>hereAi:</strong> ${formatMarkdownAndCode(reply)}`;
                            }
                            savedChats[activeChatAtTimeOfRequest].html = tempDiv.innerHTML;
                            saveChatsToStorage();
                        }
                        return;
                    }

                    const loader = document.getElementById(loaderId);

                    if (data.choices && data.choices[0].message.content) {
                        const reply = data.choices[0].message.content;
                        messagesHistory.push({ role: "assistant", content: reply });

                        loader.style.fontSize = currentFontSize;
                        loader.style.fontWeight = isBold ? 'bold' : 'normal';
                        if (!isRainbow) loader.style.color = currentTextColor;

                        if (isTypingEffect) {
                            typeWriterEffect(loader, reply, currentChatId);
                        } else {
                            if (isRainbow) {
                                loader.innerHTML = `<strong>hereAi:</strong> <span class="rainbow-text">${formatMarkdownAndCode(reply)}</span>`;
                            } else {
                                loader.innerHTML = `<strong>hereAi:</strong> ${formatMarkdownAndCode(reply)}`;
                            }
                            saveCurrentState();
                        }
                    } else {
                        loader.innerHTML = `<strong>hereAi:</strong> [–Ю—И–Є–±–Ї–∞ —Б–µ—А–≤–µ—А–∞ –Є–ї–Є –ї–Є–Љ–Є—В–Њ–≤]`;
                        saveCurrentState();
                    }
                } catch (error) {
                    const loader = document.getElementById(loaderId);
                    if (loader) loader.innerHTML = `<strong>hereAi:</strong> –Э–µ —Г–і–∞–ї–Њ—Б—М –њ–Њ–і–Ї–ї—О—З–Є—В—М—Б—П –Ї —Б–µ—А–≤–µ—А—Г Vercel.`;
                    console.error(error);
                }
            }, responseDelayMs);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('load', () => {
            loadChatsFromStorage();
            userInput.focus();
        });
    </script>
</body>
