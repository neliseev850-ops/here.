<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>here. 1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
            font-smooth: never;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #000000;
        }
        
        /* Мобильная шапка */
        .mobile-header {
            display: none;
            width: 100%;
            height: 60px;
            background-color: #000000;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .header-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .burger-icon {
            width: 20px;
            height: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .burger-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
        }
        .plus-icon {
            width: 24px;
            height: 24px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: relative;
        }
        .plus-icon::before, .plus-icon::after {
            content: '';
            position: absolute;
            background-color: #ffffff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .plus-icon::before { width: 12px; height: 2px; }
        .plus-icon::after { width: 2px; height: 12px; }

        /* Левый сайдбар */
        .sidebar-left {
            width: 220px;
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #000000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-left-top {
            padding: 15px 15px 5px 15px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .header-title {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .btn-new-chat {
            display: block;
            width: 100%;
            padding: 8px 15px;
            border: 1px solid #ffffff;
            border-radius: 20px;
            text-align: left;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #ffffff;
            flex-shrink: 0;
        }
        
        /* Список сохраненных чатов */
        .history-container {
            margin-top: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar {
            width: 0px;
        }
        .history-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 5px;
            padding-left: 5px;
        }
        .history-item {
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background-color: #111111;
            border-color: #333333;
        }
        .history-item.active {
            border-color: #ffffff;
            background-color: #111111;
        }
        .btn-delete-chat {
            background: transparent;
            border: none;
            color: #555555;
            cursor: pointer;
            font-size: 11px;
            padding: 0 4px;
        }
        .btn-delete-chat:hover {
            color: #ff3333;
        }

        /* Копирайт футер в сайдбаре */
        .sidebar-footer {
            padding: 15px;
            font-size: 12px;
            color: #555555;
            text-align: center;
            border-top: 1px solid #111111;
            user-select: none;
        }

        /* Главный контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 40px;
            height: 100%;
            background-color: #000000;
            position: relative;
        }
        .chat-window {
            flex: 1;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            overflow-y: auto;
            white-space: pre-wrap;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-window::-webkit-scrollbar {
            width: 0px;
        }
        .message {
            line-height: 1.6;
            font-size: 16px;
            transition: color 0.3s, font-size 0.3s;
        }
        
        /* СТИЛЬНОЕ ОКОШКО ДЛЯ КОДА */
        .code-block-wrapper {
            background-color: #0d0d0d;
            border: 1px solid #222222;
            border-radius: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .code-block-header {
            background-color: #161616;
            padding: 6px 14px;
            font-size: 11px;
            color: #777777;
            border-bottom: 1px solid #222222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .code-block-content {
            padding: 14px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #33ff33; /* Зеленый цвет хакерской консоли для кода */
            line-height: 1.4;
            white-space: pre;
        }

        @keyframes subtle-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .shake-active {
            animation: subtle-shake 0.2s infinite;
        }
        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 100%;
            animation: rainbow-animation 8s linear infinite;
            display: inline-block;
        }
        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        .main-title-container {
            text-align: center;
            margin-top: 25vh;
        }
        .main-title {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Область ввода */
        .input-wrapper {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 10px auto;
            position: relative;
            display: flex;
            align-items: center;
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 28px;
            padding: 6px 12px;
        }
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: none;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #ffffff;
        }
        .search-input::placeholder {
            color: #757575;
        }
        .enter-icon {
            position: absolute;
            right: 16px;
            font-size: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #ffffff;
            opacity: 0.8;
        }

        /* Правый сайдбар */
        .sidebar-right {
            width: 240px;
            border-left: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #000000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .command-list-header {
            padding: 15px;
            border-bottom: 1px solid #222222;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }
        .commands-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .commands-container::-webkit-scrollbar {
            width: 0px;
        }
        .command-group-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            margin-top: 5px;
            margin-bottom: 3px;
        }
        .command-item {
            font-size: 13px;
            cursor: pointer;
            padding: 4px 6px;
            border: 1px dashed transparent;
            transition: all 0.2s;
        }
        .command-item:hover {
            border-color: #ffffff;
            background-color: #111111;
        }
        
        /* Кнопка переключения режимов */
        .mode-footer {
            padding: 15px;
            border-top: 1px solid #222222;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        .mode-footer:hover {
            background-color: #111111;
        }

        /* Задний фон под меню */
        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 4;
        }

        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }
            .main-content {
                padding: 70px 16px 20px 16px;
            }
            .main-title-container {
                margin-top: 15vh;
            }
            .input-wrapper {
                margin-bottom: 5px;
                background-color: #000000;
                border-color: #444444;
            }
            
            .sidebar-left {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(-100%);
                width: 240px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            }
            .sidebar-right {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 6;
                transform: translateX(100%);
                width: 240px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.7);
            }

            .sidebar-left.active, .sidebar-right.active {
                transform: translateX(0);
            }
            .overlay.active {
                display: block;
            }
        }
    </style>

                <div class="command-item" onclick="insertCommand('purple')">purple</div>

    <script>
        const API_URL = "/api/chat";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        
        const sidebarLeft = document.getElementById('sidebar-left');
        const sidebarRight = document.getElementById('sidebar-right');
        const btnToggleLeft = document.getElementById('toggle-left');
        const overlay = document.getElementById('blur-overlay');
        const historyListEl = document.getElementById('chats-history-list');
        const modeSwitcher = document.getElementById('mode-switcher');

        let currentChatId = null; 
        let savedChats = {}; 
        let messagesHistory = [];
        
        let currentTextColor = '#ffffff';
        let isRainbow = false;
        let currentFontSize = '16px';
        let isBold = false;
        let isShake = false;
        let isTypingEffect = true; // Изменение: по умолчанию печать ВСЕГДА включена
        let minTokens = 10;
        let maxTokens = 1024;
        let responseDelayMs = 0;

        const modes = [
            { id: 'default', name: 'hereAi (Default)' },
            { id: 'it', name: 'hereAi (IT Mode)' },
            { id: 'fun', name: 'hereAi (Fun Mode)' },
            { id: 'drunk', name: 'hereAi (Drunk Mode)' },
            { id: 'care', name: 'hereAi (Care Mode)' }
        ];
        let currentModeIndex = 0;

        function cycleMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            const mode = modes[currentModeIndex];
            
            modeSwitcher.innerText = `Mode: ${mode.name}`;
            
            chatWindow.innerHTML += `<div class="message" style="color: #888888; font-size:13px; border-left: 2px solid #333333; padding-left: 5px;">[Режим изменен]: ${mode.name}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            messagesHistory = [];
            saveCurrentState();
        }

        function loadChatsFromStorage() {
            const data = localStorage.getItem('here_saved_chats');
            if (data) {
                savedChats = JSON.parse(data);
                renderHistoryList();
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('here_saved_chats', JSON.stringify(savedChats));
        }

        function renderHistoryList() {
            historyListEl.innerHTML = '';
            Object.keys(savedChats).forEach(id => {
                const chat = savedChats[id];
                const activeClass = id === currentChatId ? 'active' : '';
                
                const item = document.createElement('div');
                item.className = `history-item ${activeClass}`;
                item.setAttribute('onclick', `switchChat('${id}')`);
                item.innerHTML = `
                    <span>${chat.title}</span>
                    <button class="btn-delete-chat" onclick="deleteChat(event, '${id}')">×</button>
                `;
                historyListEl.appendChild(item);
            });
        }

        function createNewChat() {
            if (currentChatId && messagesHistory.length > 0) {
                saveCurrentState();
            }
            
            currentChatId = null;
            messagesHistory = [];
            closeAllMenus();
            
            chatWindow.innerHTML = `
                <div class="main-title-container" id="welcome-screen">
                    <h1 class="main-title">here.</h1>
                </div>
            `;
            
            chatWindow.classList.remove('shake-active');
            isShake = false; isRainbow = false; isBold = false; isTypingEffect = true;
            currentTextColor = '#ffffff'; currentFontSize = '16px';
            minTokens = 10; maxTokens = 1024; responseDelayMs = 0;
            
            renderHistoryList();
            userInput.focus();
        }

        function saveCurrentState() {
            if (!currentChatId || messagesHistory.length === 0) return;

            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.style.display = 'none';

            savedChats[currentChatId].messages = messagesHistory;
            savedChats[currentChatId].html = chatWindow.innerHTML;
            
            saveChatsToStorage();
        }

        function switchChat(id) {
            if (messagesHistory.length > 0) {
                saveCurrentState();
            }

            currentChatId = id;
            const targetChat = savedChats[id];
            messagesHistory = targetChat.messages;
            
            chatWindow.innerHTML = targetChat.html;
            closeAllMenus();
            renderHistoryList();
            chatWindow.scrollTop = chatWindow.scrollHeight;
            userInput.focus();
        }

        function deleteChat(event, id) {
            event.stopPropagation(); 
            delete savedChats[id];
            saveChatsToStorage();
            
            if (currentChatId === id) {
                currentChatId = null;
                messagesHistory = [];
                chatWindow.innerHTML = `
                    <div class="main-title-container" id="welcome-screen">
                        <h1 class="main-title">here.</h1>
                    </div>
                `;
            }
            renderHistoryList();
        }

        btnToggleLeft.addEventListener('click', () => {
            sidebarLeft.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', closeAllMenus);

        function closeAllMenus() {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.remove('active');
            overlay.classList.remove('active');
        }

        function openCommands() {
            sidebarLeft.classList.remove('active');
            sidebarRight.classList.add('active');
        }

        function insertCommand(cmd) {
            userInput.value = cmd;
            closeAllMenus();
            userInput.focus();
        }

        function parseAndApplyCommands(text) {
            let cleanText = text.trim().toLowerCase();
            let isCommand = false;

            if (cleanText === 'white') { currentTextColor = '#ffffff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'red') { currentTextColor = '#ff3333'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'green') { currentTextColor = '#33ff33'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'orange') { currentTextColor = '#ff9900'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'blue') { currentTextColor = '#3399ff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'yellow') { currentTextColor = '#ffff33'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'purple') { currentTextColor = '#cc33ff'; isRainbow = false; isCommand = true; }
            else if (cleanText === 'rainbow') { isRainbow = true; isCommand = true; }
            else if (cleanText.startsWith('size:')) {
                let num = parseInt(cleanText.replace('size:', '').trim());
                if (!isNaN(num) && num >= 1 && num <= 100) { currentFontSize = num + 'px'; isCommand = true; }
            }
            else if (cleanText.startsWith('min ')) {
                let num = parseInt(cleanText.replace('min ', '').trim());
                if (!isNaN(num)) { minTokens = num; isCommand = true; }
            }
            else if (cleanText.startsWith('max ')) {
                let num = parseInt(cleanText.replace('max ', '').trim());
                if (!isNaN(num)) { maxTokens = num; isCommand = true; }
            }
            else if (cleanText === 'shake') { isShake = true; isCommand = true; chatWindow.classList.add('shake-active'); }
            else if (cleanText === 'noshake') { isShake = false; isCommand = true; chatWindow.classList.remove('shake-active'); }
            else if (cleanText.startsWith('delay ') && cleanText.endsWith(' sec')) {
                let num = parseInt(cleanText.replace('delay ', '').replace(' sec', '').trim());
                if (!isNaN(num) && num >= 5 && num <= 1000) { responseDelayMs = num * 1000; isCommand = true; }
            }
            else if (cleanText === 'bold') { isBold = true; isCommand = true; }
            else if (cleanText === 'nobold') { isBold = false; isCommand = true; }
            else if (cleanText === 'notyping') { isTypingEffect = false; isCommand = true; } // Изменение: убрали команду typing, оставили только notyping

            if (isCommand) {
                chatWindow.innerHTML += `<div class="message" style="color: #888888; font-size:13px;">[Система]: Настройка "${text.trim()}" успешно применена.</div>`;
                userInput.value = '';
                chatWindow.scrollTop = chatWindow.scrollHeight;
                saveCurrentState();
                return true;
            }
            return false;
        }
